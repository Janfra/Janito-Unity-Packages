name: Unity Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 'Test - ${{ matrix.packageConfig.displayName }} [V: ${{ matrix.unityVersion }} - M: ${{ matrix.testMode }}]'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        unityVersion: ['2022.3.0f1', '6000.0.0f1']
        testMode:
          - playmode
          - editmode
        packageConfig:
          - { path: 'JanitoEditorExtrasPackage', name: 'com.janito.editorextras', displayName: 'Editor Extras' }
          # TODO: Add support for Git URL package dependency 
          # - { path: 'JanitoAnimationPackage', name: 'com.janito.animationpackage', displayName: 'Animations' }
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Run Tests - ${{ matrix.packageConfig.displayName }}
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          packageMode: true
          testMode: ${{ matrix.testMode }} 
          projectPath: ./${{ matrix.packageConfig.path }}
          unityVersion: ${{ matrix.unityVersion }}
          artifactsPath: ${{ matrix.unityVersion }}-${{ matrix.packageConfig.name }}-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }}-${{ matrix.packageConfig.displayName }} Test Results
      
      - name: Upload Test Results
        if: steps.tests.outputs.artifactsPath != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.unityVersion }}-${{ matrix.testMode }}-${{ matrix.packageConfig.name }}
          path: ${{ steps.tests.outputs.artifactsPath }}
